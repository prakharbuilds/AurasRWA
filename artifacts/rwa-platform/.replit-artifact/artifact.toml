kind = "web"
previewPath = "/"
title = "RWA Tokenization Platform"
version = "1.0.0"
id = "artifacts/rwa-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20668

[services.development]
run = "pnpm --filter @workspace/rwa-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rwa-platform", "run", "build" ]
publicDir = "artifacts/rwa-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20668"
BASE_PATH = "/"
